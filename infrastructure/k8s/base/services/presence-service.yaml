apiVersion: apps/v1
kind: Deployment
metadata:
  name: presence-service
  namespace: rajutechie-streamkit
  labels:
    app.kubernetes.io/name: presence-service
    app.kubernetes.io/part-of: rajutechie-streamkit-platform
    app.kubernetes.io/component: service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: presence-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: presence-service
        app.kubernetes.io/part-of: rajutechie-streamkit-platform
        app.kubernetes.io/component: service
    spec:
      containers:
        - name: presence-service
          image: rajutechie-streamkit/presence-service:latest
          ports:
            - containerPort: 3017
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rajutechie-streamkit-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3017
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3017
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: presence-service
  namespace: rajutechie-streamkit
  labels:
    app.kubernetes.io/name: presence-service
    app.kubernetes.io/part-of: rajutechie-streamkit-platform
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: presence-service
  ports:
    - port: 3017
      targetPort: 3017
      protocol: TCP
      name: http
