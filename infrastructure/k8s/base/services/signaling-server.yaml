apiVersion: apps/v1
kind: Deployment
metadata:
  name: signaling-server
  namespace: rajutechie-streamkit
  labels:
    app.kubernetes.io/name: signaling-server
    app.kubernetes.io/part-of: rajutechie-streamkit-platform
    app.kubernetes.io/component: signaling
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: signaling-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signaling-server
        app.kubernetes.io/part-of: rajutechie-streamkit-platform
        app.kubernetes.io/component: signaling
    spec:
      containers:
        - name: signaling-server
          image: rajutechie-streamkit/signaling-server:latest
          ports:
            - containerPort: 3030
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rajutechie-streamkit-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: signaling-server
  namespace: rajutechie-streamkit
  labels:
    app.kubernetes.io/name: signaling-server
    app.kubernetes.io/part-of: rajutechie-streamkit-platform
    app.kubernetes.io/component: signaling
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: signaling-server
  ports:
    - port: 3030
      targetPort: 3030
      protocol: TCP
      name: http
