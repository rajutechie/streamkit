apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rajutechie-streamkit-staging

namePrefix: staging-

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

configMapGenerator:
  - name: rajutechie-streamkit-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=info

commonLabels:
  environment: staging
