# RajutechieStreamKit - Infrastructure Dependencies
# Usage: docker compose -f docker-compose.deps.yml up -d
# Provides: PostgreSQL, MongoDB, Redis, Kafka (KRaft), MinIO

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16 - Relational data store
  # Used by: auth-service, user-service, meeting-service, analytics-service
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rajutechie-streamkit-postgres
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rajutechie-streamkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rajutechie-streamkit_secret}
      POSTGRES_DB: ${POSTGRES_DB:-rajutechie-streamkit}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rajutechie-streamkit} -d ${POSTGRES_DB:-rajutechie-streamkit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rajutechie-streamkit-network

  # ─────────────────────────────────────────────
  # MongoDB 7 - Document store
  # Used by: chat-service, notification-service, moderation-service
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: rajutechie-streamkit-mongodb
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-rajutechie-streamkit}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-rajutechie-streamkit_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-rajutechie-streamkit}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init-scripts/mongo:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rajutechie-streamkit-network

  # ─────────────────────────────────────────────
  # Redis 7 - Cache, pub/sub, session store
  # Used by: all services (caching, presence, pub/sub)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rajutechie-streamkit-redis
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-rajutechie-streamkit_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-rajutechie-streamkit_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rajutechie-streamkit-network

  # ─────────────────────────────────────────────
  # Kafka (KRaft mode via Bitnami) - Event streaming
  # Used by: all services (event-driven communication)
  # ─────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: rajutechie-streamkit-kafka
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      # KRaft mode configuration (no Zookeeper)
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listener configuration
      KAFKA_CFG_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topic defaults
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Auto-create topics for development
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Log retention
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_CFG_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:29092 | grep -q 'ApiVersion'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - rajutechie-streamkit-network

  # ─────────────────────────────────────────────
  # MinIO - S3-compatible object storage
  # Used by: media-service, stream-service (recordings, thumbnails)
  # Console: http://localhost:9001
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: rajutechie-streamkit-minio
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rajutechie-streamkit}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rajutechie-streamkit_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rajutechie-streamkit-network

  # ─────────────────────────────────────────────
  # MinIO bucket initialization (runs once then exits)
  # ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: rajutechie-streamkit-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set rajutechie-streamkit http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing rajutechie-streamkit/media;
        mc mb --ignore-existing rajutechie-streamkit/recordings;
        mc mb --ignore-existing rajutechie-streamkit/thumbnails;
        mc anonymous set download rajutechie-streamkit/thumbnails;
        echo 'MinIO buckets initialized successfully';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rajutechie-streamkit}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rajutechie-streamkit_secret}
    networks:
      - rajutechie-streamkit-network

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  minio_data:
    driver: local

networks:
  rajutechie-streamkit-network:
    name: rajutechie-streamkit-network
    driver: bridge
