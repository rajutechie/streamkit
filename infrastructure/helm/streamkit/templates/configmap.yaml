apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rajutechie-streamkit.fullname" . }}-config
  namespace: {{ include "rajutechie-streamkit.namespace" . }}
  labels:
    {{- include "rajutechie-streamkit.labels" (dict "serviceName" "rajutechie-streamkit" "context" $) | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
