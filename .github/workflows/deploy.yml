# RajutechieStreamKit - Deployment Pipeline
# Triggered on push to main after CI passes. Builds and pushes Docker images
# for every service to ECR, then auto-deploys to staging. Production requires
# manual approval in the GitHub environment gate.

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # Wait for CI to pass before deploying
  # ──────────────────────────────────────────────────────────────
  ci-check:
    name: Verify CI Status
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: CI Status
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

  # ──────────────────────────────────────────────────────────────
  # Build Docker images for all services and push to ECR
  # ──────────────────────────────────────────────────────────────
  build-images:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: ci-check
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - ws-gateway
          - auth-service
          - user-service
          - chat-service
          - call-service
          - meeting-service
          - stream-service
          - notification-service
          - presence-service
          - media-service
          - analytics-service
          - moderation-service
          - signaling-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/rajutechie-streamkit/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=main-{{date 'YYYYMMDD'}}-{{sha}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

  # ──────────────────────────────────────────────────────────────
  # Deploy to Staging (automatic)
  # ──────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    environment:
      name: staging
      url: https://staging.rajutechie-streamkit.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name rajutechie-streamkit-staging \
            --region ${{ env.AWS_REGION }}

      - name: Update image tags in staging overlay
        run: |
          SERVICES=(
            api-gateway ws-gateway auth-service user-service
            chat-service call-service meeting-service stream-service
            notification-service presence-service media-service
            analytics-service moderation-service signaling-server
          )
          for svc in "${SERVICES[@]}"; do
            echo "Updating ${svc} to image tag ${IMAGE_TAG}"
            cd infrastructure/k8s/overlays/staging
            kustomize edit set image \
              "rajutechie-streamkit/${svc}=${{ env.ECR_REGISTRY }}/rajutechie-streamkit/${svc}:${IMAGE_TAG}"
            cd "${GITHUB_WORKSPACE}"
          done

      - name: Deploy to staging with ArgoCD
        run: |
          # Option A: ArgoCD sync (preferred if ArgoCD is installed)
          if command -v argocd &> /dev/null; then
            argocd app sync rajutechie-streamkit-staging \
              --server "${{ secrets.ARGOCD_SERVER }}" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --grpc-web \
              --prune \
              --timeout 300
            argocd app wait rajutechie-streamkit-staging \
              --server "${{ secrets.ARGOCD_SERVER }}" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --grpc-web \
              --timeout 300
          else
            # Option B: Direct kubectl apply via kustomize
            echo "ArgoCD not available - applying with kubectl"
            kubectl apply -k infrastructure/k8s/overlays/staging
            echo "Waiting for rollouts to complete..."
            SERVICES=(
              api-gateway ws-gateway auth-service user-service
              chat-service call-service meeting-service stream-service
              notification-service presence-service media-service
              analytics-service moderation-service signaling-server
            )
            for svc in "${SERVICES[@]}"; do
              kubectl rollout status deployment/"${svc}" \
                -n rajutechie-streamkit-staging \
                --timeout=180s || true
            done
          fi

      - name: Run staging smoke tests
        run: |
          STAGING_URL="https://staging-api.rajutechie-streamkit.io"
          echo "Running smoke tests against ${STAGING_URL}"

          # Health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Health check returned HTTP ${HTTP_STATUS} (may not be routable from GH runner)"
          else
            echo "Health check passed (HTTP ${HTTP_STATUS})"
          fi

      - name: Notify staging deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Staging deployment ${STATUS} for commit ${GITHUB_SHA::8}"
          # Extend with Slack/Teams webhook:
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -H 'Content-Type: application/json' \
          #   -d "{\"text\":\"Staging deployment ${STATUS} for rajutechie-streamkit@${GITHUB_SHA::8}\"}"

  # ──────────────────────────────────────────────────────────────
  # Deploy to Production (manual approval required)
  # ──────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://api.rajutechie-streamkit.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name rajutechie-streamkit-production \
            --region ${{ env.AWS_REGION }}

      - name: Update image tags in production overlay
        run: |
          SERVICES=(
            api-gateway ws-gateway auth-service user-service
            chat-service call-service meeting-service stream-service
            notification-service presence-service media-service
            analytics-service moderation-service signaling-server
          )
          for svc in "${SERVICES[@]}"; do
            echo "Updating ${svc} to image tag ${IMAGE_TAG}"
            cd infrastructure/k8s/overlays/production
            kustomize edit set image \
              "rajutechie-streamkit/${svc}=${{ env.ECR_REGISTRY }}/rajutechie-streamkit/${svc}:${IMAGE_TAG}"
            cd "${GITHUB_WORKSPACE}"
          done

      - name: Deploy to production with ArgoCD
        run: |
          if command -v argocd &> /dev/null; then
            argocd app sync rajutechie-streamkit-production \
              --server "${{ secrets.ARGOCD_SERVER }}" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --grpc-web \
              --prune \
              --timeout 300
            argocd app wait rajutechie-streamkit-production \
              --server "${{ secrets.ARGOCD_SERVER }}" \
              --auth-token "${{ secrets.ARGOCD_TOKEN }}" \
              --grpc-web \
              --timeout 300
          else
            echo "ArgoCD not available - applying with kubectl"
            kubectl apply -k infrastructure/k8s/overlays/production
            SERVICES=(
              api-gateway ws-gateway auth-service user-service
              chat-service call-service meeting-service stream-service
              notification-service presence-service media-service
              analytics-service moderation-service signaling-server
            )
            for svc in "${SERVICES[@]}"; do
              kubectl rollout status deployment/"${svc}" \
                -n rajutechie-streamkit-production \
                --timeout=300s || true
            done
          fi

      - name: Run production smoke tests
        run: |
          PROD_URL="https://api.rajutechie-streamkit.io"
          echo "Running production smoke tests against ${PROD_URL}"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/health" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Production health check returned HTTP ${HTTP_STATUS}"
          else
            echo "Production health check passed (HTTP ${HTTP_STATUS})"
          fi

      - name: Notify production deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Production deployment ${STATUS} for commit ${GITHUB_SHA::8}"
          # Extend with Slack/Teams/PagerDuty webhook:
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -H 'Content-Type: application/json' \
          #   -d "{\"text\":\"PRODUCTION deployment ${STATUS} for rajutechie-streamkit@${GITHUB_SHA::8}\"}"
