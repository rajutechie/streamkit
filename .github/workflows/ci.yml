# RajutechieStreamKit - Continuous Integration
# Runs on every push and PR targeting main or develop branches.
# Matrix-tests packages across Node.js 20 and 22, then validates
# that all service Docker images build successfully.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # Packages & SDKs - lint, typecheck, build, test
  # ──────────────────────────────────────────────────────────────
  packages:
    name: Packages (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Upload coverage artifacts
        if: matrix.node-version == 22 && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            packages/*/coverage
            services/*/coverage
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Services - validate Docker images build successfully
  # ──────────────────────────────────────────────────────────────
  services:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: packages
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - ws-gateway
          - auth-service
          - user-service
          - chat-service
          - call-service
          - meeting-service
          - stream-service
          - notification-service
          - presence-service
          - media-service
          - analytics-service
          - moderation-service
          - signaling-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: rajutechie-streamkit/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ──────────────────────────────────────────────────────────────
  # CI gate - single status check for branch protection
  # ──────────────────────────────────────────────────────────────
  ci-ok:
    name: CI Status
    if: always()
    runs-on: ubuntu-latest
    needs: [packages, services]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.packages.result }}" != "success" ]]; then
            echo "::error::Packages job failed"
            exit 1
          fi
          if [[ "${{ needs.services.result }}" != "success" ]]; then
            echo "::error::Services job failed"
            exit 1
          fi
          echo "All CI jobs passed"
