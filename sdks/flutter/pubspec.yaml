name: rajutechie_streamkit
description: Flutter SDK for the Rajutechie StreamKit self-hosted real-time communication platform. Chat, video calls, meetings, live streaming and presence in one package.
version: 0.1.0
homepage: https://github.com/rajutechie/streamkit
repository: https://github.com/rajutechie/streamkit/tree/main/sdks/flutter

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
